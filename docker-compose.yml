services:
  frontend:
    build: ./frontend
    container_name: fit-web
    ports:
      - "3210:80"
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: fit-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
